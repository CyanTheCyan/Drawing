<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mobile Sandbox</title>
<style>
body {
  margin: 0;
  background: white;
  font-family: sans-serif;
  text-align: center;
  overflow: hidden;
}
h3 { margin: 10px; }
canvas { display: block; touch-action: none; }
button {
  margin: 3px;
  padding: 8px;
  font-weight: bold;
  border: none;
  background: #eee;
}
</style>
</head>
<body>

<h3>Sandbox</h3>

<div>
<button onclick="setMat('sand')">Sand</button>
<button onclick="setMat('water')">Water</button>
<button onclick="setMat('stone')">Stone</button>
<button onclick="setMat('wire')">Wire</button>
<button onclick="setMat('battery')">Battery</button>
<button onclick="setMat('uranium')">Uranium</button>
<button onclick="setMat('slime')">Slime</button>
<button onclick="setMat('pipe')">Pipe</button>
<button onclick="setMat('motor')">Motor</button>
<button onclick="setMat('piston')">Piston</button>
<button onclick="setMat('select')">Select</button>
<button onclick="setMat('eraser')">Eraser</button>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 80;
}
resize();
window.onresize = resize;

const SIZE = 2;
let W, H;

let grid, power, links;

function initGrid(){
  W = Math.floor(canvas.width / SIZE);
  H = Math.floor(canvas.height / SIZE);

  grid = Array.from({length:W},()=>Array(H).fill(null));
  power = Array.from({length:W},()=>Array(H).fill(0));
  links = Array.from({length:W},()=>Array(H).fill(null));
}
initGrid();

let mat = "sand";
let drawing = false;
let selected = null;

function setMat(m){ mat = m; }

function getPos(e){
  const rect = canvas.getBoundingClientRect();
  let x = e.touches ? e.touches[0].clientX : e.clientX;
  let y = e.touches ? e.touches[0].clientY : e.clientY;

  return {
    x: Math.floor((x - rect.left)/SIZE),
    y: Math.floor((y - rect.top)/SIZE)
  };
}

function paint(e){
  if(!drawing) return;
  const {x,y} = getPos(e);

  // SELECT TOOL
  if(mat==="select"){
    if(!selected){
      if(grid[x][y]==="motor" || grid[x][y]==="piston"){
        selected = {x,y};
      }
    } else {
      links[selected.x][selected.y] = {x,y};
      selected = null;
    }
    return;
  }

  // STAMP ONLY
  if(mat==="motor" || mat==="piston"){
    if(x>=0 && y>=0 && x<W && y<H){
      grid[x][y] = mat;
    }
    return;
  }

  // NORMAL DRAW
  for(let dx=-3;dx<=3;dx++){
    for(let dy=-3;dy<=3;dy++){
      if(dx*dx+dy*dy>9) continue;

      let nx=x+dx, ny=y+dy;
      if(nx>=0&&ny>=0&&nx<W&&ny<H){
        if(mat==="eraser"){
          grid[nx][ny]=null;
          power[nx][ny]=0;
          links[nx][ny]=null;
        } else {
          grid[nx][ny]=mat;
        }
      }
    }
  }
}

canvas.onmousedown = (e)=>{ drawing=true; paint(e); };
canvas.onmouseup = ()=>drawing=false;
canvas.onmousemove = paint;

canvas.ontouchstart = (e)=>{ drawing=true; paint(e); };
canvas.ontouchend = ()=>drawing=false;
canvas.ontouchmove = (e)=>{ e.preventDefault(); paint(e); };

// SIMULATION
function update(){
  for(let x=0;x<W;x++){
    for(let y=0;y<H;y++){
      power[x][y]*=0.92;
    }
  }

  for(let y=H-1;y>=0;y--){
    for(let x=0;x<W;x++){
      let m = grid[x][y];
      if(!m) continue;

      // SAND
      if(m==="sand"){
        if(y+1<H && !grid[x][y+1]){
          grid[x][y+1]=m; grid[x][y]=null;
        }
      }

      // WATER + PIPE FLOW
      if(m==="water"){
        let moved=false;

        if(y+1<H && !grid[x][y+1]){
          grid[x][y+1]=m; grid[x][y]=null;
          moved=true;
        }

        if(!moved){
          let dirs=[[1,0],[-1,0],[0,1],[0,-1]];
          for(let d of dirs){
            let nx=x+d[0], ny=y+d[1];
            if(nx>=0&&ny>=0&&nx<W&&ny<H && grid[nx][ny]==="pipe"){
              for(let d2 of dirs){
                let tx=nx+d2[0], ty=ny+d2[1];
                if(tx>=0&&ty>=0&&tx<W&&ty<H && !grid[tx][ty]){
                  grid[tx][ty]="water";
                  grid[x][y]=null;
                  moved=true;
                  break;
                }
              }
            }
            if(moved) break;
          }
        }

        if(!moved){
          let dir=Math.random()<0.5?-1:1;
          if(x+dir>=0&&x+dir<W&&!grid[x+dir][y]){
            grid[x+dir][y]=m; grid[x][y]=null;
          }
        }
      }

      // POWER
      if(m==="battery") power[x][y]=1;

      if(m==="wire"){
        let dirs=[[1,0],[-1,0],[0,1],[0,-1]];
        for(let d of dirs){
          let nx=x+d[0], ny=y+d[1];
          if(nx>=0&&ny>=0&&nx<W&&ny<H && power[nx][ny]>0.4){
            power[x][y]=1;
          }
        }
      }

      // MOTOR
      if(m==="motor" && links[x][y] && power[x][y]>0.5){
        let t = links[x][y];
        let nx = t.x+1;
        if(nx<W && !grid[nx][t.y]){
          grid[nx][t.y]=grid[t.x][t.y];
          grid[t.x][t.y]=null;
        }
      }

      // PISTON
      if(m==="piston" && links[x][y] && power[x][y]>0.5){
        let t = links[x][y];
        let ny = t.y-1;
        if(ny>=0 && !grid[t.x][ny]){
          grid[t.x][ny]=grid[t.x][t.y];
          grid[t.x][t.y]=null;
        }
      }
    }
  }
}

// RENDER
function render(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 for(let x=0;x<W;x++){
  for(let y=0;y<H;y++){
    let m=grid[x][y];
    if(!m) continue;

    if(m==="pipe"){
      ctx.fillStyle="#777";
      ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
      ctx.fillStyle="#111";
      ctx.fillRect(x*SIZE+SIZE*0.25,y*SIZE+SIZE*0.25,SIZE*0.5,SIZE*0.5);
      continue;
    }

    let color="#000";
    if(m==="sand") color="#e6d28f";
    if(m==="water") color="#4aa3ff";
    if(m==="stone") color="#999";
    if(m==="slime") color="#66ffbb";
    if(m==="uranium") color="#66ff66";
    if(m==="battery") color="#ff5555";
    if(m==="motor") color="#ff00ff";
    if(m==="piston") color="#ff8800";
    if(m==="wire") color = power[x][y]>0.5 ? "#ffd84d" : "#bbb";

    ctx.fillStyle=color;
    ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
  }
 }
}

// LOOP
function loop(){
 update();
 render();
 requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
