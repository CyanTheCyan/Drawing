<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mobile Sandbox</title>
<style>
body {
  margin: 0;
  background: white;
  font-family: sans-serif;
  text-align: center;
  overflow: hidden;
}

h3 {
  margin: 10px;
}

canvas {
  display: block;
  touch-action: none; /* IMPORTANT for mobile */
}

button {
  margin: 3px;
  padding: 8px;
  font-weight: bold;
  border: none;
  background: #eee;
}
</style>
</head>
<body>

<h3>Sandbox</h3>

<div>
<button onclick="setMat('sand')">Sand</button>
<button onclick="setMat('water')">Water</button>
<button onclick="setMat('stone')">Stone</button>
<button onclick="setMat('wire')">Wire</button>
<button onclick="setMat('battery')">Battery</button>
<button onclick="setMat('uranium')">Uranium</button>
<button onclick="setMat('slime')">Slime</button>
<button onclick="setMat('pipe_suck')">Pipe Suction</button>
<button onclick="setMat('pipe_blow')">Pipe Blow</button>
<button onclick="setMat('motor')">Motor</button>
<button onclick="setMat('piston')">Piston</button>
<button onclick="setMat('eraser')">Eraser</button>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// FULLSCREEN CANVAS
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 80;
}
resize();
window.onresize = resize;

const SIZE = 2;
let W, H;

let grid, power, bindings;

function initGrid(){
  W = Math.floor(canvas.width / SIZE);
  H = Math.floor(canvas.height / SIZE);

  grid = Array.from({length:W},()=>Array(H).fill(null));
  power = Array.from({length:W},()=>Array(H).fill(0));
  bindings = Array.from({length:W},()=>Array(H).fill(null));
}
initGrid();

let mat = "sand";
let drawing = false;

// SHIFT detection for binding
let shiftDown = false;
window.onkeydown = (e)=>{ if(e.key==="Shift") shiftDown=true; };
window.onkeyup = (e)=>{ if(e.key==="Shift") shiftDown=false; };

function setMat(m){ mat = m; }

// GET POSITION (mouse + touch)
function getPos(e){
  const rect = canvas.getBoundingClientRect();
  let x, y;

  if(e.touches){
    x = e.touches[0].clientX;
    y = e.touches[0].clientY;
  } else {
    x = e.clientX;
    y = e.clientY;
  }

  return {
    x: Math.floor((x - rect.left)/SIZE),
    y: Math.floor((y - rect.top)/SIZE)
  };
}

// DRAW
function paint(e){
  if(!drawing) return;
  const {x,y} = getPos(e);

  for(let dx=-3;dx<=3;dx++){
    for(let dy=-3;dy<=3;dy++){
      if(dx*dx+dy*dy>9) continue;

      let nx=x+dx, ny=y+dy;
      if(nx>=0&&ny>=0&&nx<W&&ny<H){
        if(mat==="eraser"){
          grid[nx][ny]=null;
          power[nx][ny]=0;
          bindings[nx][ny]=null;
        } else if(mat==="motor" || mat==="piston"){
          // can't draw with motors/pistons, need shift-click to bind
          if(shiftDown) bindings[nx][ny]=mat;
        } else if(mat==="pipe_suck" || mat==="pipe_blow"){
          grid[nx][ny]=mat;
        } else {
          grid[nx][ny]=mat;
        }
      }
    }
  }
}

// EVENTS
canvas.onmousedown = (e)=>{ drawing=true; paint(e); };
canvas.onmouseup = ()=>drawing=false;
canvas.onmousemove = paint;

canvas.ontouchstart = (e)=>{ drawing=true; paint(e); };
canvas.ontouchend = ()=>drawing=false;
canvas.ontouchmove = (e)=>{
  e.preventDefault();
  paint(e);
};

// SIMULATION
function update(){
  // decay power
  for(let x=0;x<W;x++){
    for(let y=0;y<H;y++){
      power[x][y]*=0.92;
    }
  }

  for(let y=H-1;y>=0;y--){
    for(let x=0;x<W;x++){
      let m = grid[x][y];
      if(!m) continue;

      // basic materials
      if(m==="sand"){
        if(y+1<H && !grid[x][y+1]){
          grid[x][y+1]=m; grid[x][y]=null;
        } else {
          let dir=Math.random()<0.5?-1:1;
          if(x+dir>=0&&x+dir<W&&y+1<H&&!grid[x+dir][y+1]){
            grid[x+dir][y+1]=m; grid[x][y]=null;
          }
        }
      }

      if(m==="water"){
        let dir=Math.random()<0.5?-1:1;
        if(y+1<H && !grid[x][y+1]){
          grid[x][y+1]=m; grid[x][y]=null;
        } else if(x+dir>=0&&x+dir<W&&!grid[x+dir][y]){
          grid[x+dir][y]=m; grid[x][y]=null;
        }
      }

      if(m==="slime"){
        if(Math.random()<0.25){
          if(y+1<H && !grid[x][y+1]){
            grid[x][y+1]=m; grid[x][y]=null;
          }
        }
      }

      if(m==="uranium"){
        if(Math.random()<0.005){
          let nx=x+(Math.random()*3|0)-1;
          let ny=y+(Math.random()*3|0)-1;
          if(nx>=0&&ny>=0&&nx<W&&ny<H && !grid[nx][ny]){
            grid[nx][ny]="uranium";
          }
        }
      }

      if(m==="battery"){
        power[x][y]=1;
      }

      if(m==="wire"){
        let dirs=[[1,0],[-1,0],[0,1],[0,-1]];
        for(let d of dirs){
          let nx=x+d[0], ny=y+d[1];
          if(nx>=0&&ny>=0&&nx<W&&ny<H){
            if(power[nx][ny]>0.4){
              power[x][y]=1;
            }
          }
        }
      }

      // pipes
      if(m==="pipe_suck"){
        let dirs=[[1,0],[-1,0],[0,1],[0,-1]];
        for(let d of dirs){
          let nx=x+d[0], ny=y+d[1];
          if(nx>=0&&ny>=0&&nx<W&&ny<H && grid[nx][ny] && grid[nx][ny]!=="pipe_suck" && grid[nx][ny]!=="pipe_blow"){
            grid[x][y]=grid[nx][ny];
            grid[nx][ny]=null;
          }
        }
      }
      if(m==="pipe_blow"){
        let dirs=[[1,0],[-1,0],[0,1],[0,-1]];
        for(let d of dirs){
          let nx=x+d[0], ny=y+d[1];
          if(nx>=0&&ny>=0&&nx<W&&ny<H && !grid[nx][ny]){
            grid[nx][ny]=m;
            grid[x][y]=null;
          }
        }
      }

      // motors/pistons
      if(bindings[x][y]==="motor"){
        // simple motor: move nearby material in one direction if powered
        if(power[x][y]>0.5){
          let nx=x+1;
          if(nx<W && !grid[nx][y]){
            grid[nx][y]=grid[x][y];
            grid[x][y]=null;
          }
        }
      }

      if(bindings[x][y]==="piston"){
        // simple piston: push material above if powered
        if(power[x][y]>0.5){
          let ny=y-1;
          if(ny>=0 && !grid[x][ny]){
            grid[x][ny]=grid[x][y];
            grid[x][y]=null;
          }
        }
      }

    }
  }
}

// RENDER
function render(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 for(let x=0;x<W;x++){
  for(let y=0;y<H;y++){
    let m=grid[x][y];
    if(!m) continue;

    let color="#000";

    if(m==="sand") color="#e6d28f";
    if(m==="water") color="#4aa3ff";
    if(m==="stone") color="#999";
    if(m==="slime") color="#66ffbb";
    if(m==="uranium") color="#66ff66";
    if(m==="battery") color="#ff5555";
    if(m==="pipe_suck") color="#33ccff";
    if(m==="pipe_blow") color="#0099ff";
    if(m==="wire") color = power[x][y]>0.5 ? "#ffd84d" : "#bbb";

    if(bindings[x][y]==="motor") color="#ff00ff";
    if(bindings[x][y]==="piston") color="#ff8800";

    ctx.globalAlpha = 0.9;
    ctx.fillStyle=color;
    ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
  }
 }
 ctx.globalAlpha = 1;
}

// LOOP
function loop(){
 update();
 render();
 requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
