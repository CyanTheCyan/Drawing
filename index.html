<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Doodle Sandbox</title>
<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }
canvas { display:block; }
#ui { position:absolute; top:10px; left:10px; z-index:10; }
button { font-size:16px; margin:2px; }
</style>
</head>
<body>

<div id="ui">
  <button onclick="placingMachine='pipe'">Pipe</button>
  <button onclick="placingMachine='motor'">Motor</button>
  <button onclick="placingMachine='piston'">Piston</button>
  <button onclick="placingMachine=null">Draw Sand</button>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let SIZE = 5;
let W,H;
let grid=[], power=[], machines=[];

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  W = Math.floor(canvas.width/SIZE);
  H = Math.floor(canvas.height/SIZE);

  // Initialize grid/power if empty
  if(grid.length===0){
    for(let x=0;x<W;x++){
      grid[x]=[];
      power[x]=[];
      for(let y=0;y<H;y++){
        grid[x][y]=null;
        power[x][y]=0;
      }
    }
    // starter battery
    grid[Math.floor(W/2)][Math.floor(H/2)]="battery";
    // starter machine
    machines.push({type:"pipe", x:Math.floor(W/2)+3, y:Math.floor(H/2), mode:"blow", link:null, extended:false});
  }
}
resize();
window.onresize = resize;

let placingMachine=null;
let drawing=false;

// Keyboard shortcuts
document.addEventListener("keydown", e=>{
  if(e.key==="p") placingMachine="pipe";
  if(e.key==="m") placingMachine="motor";
  if(e.key==="o") placingMachine="piston";
  if(e.key==="d") placingMachine=null;
});

// get pointer pos safely
function pos(e){
  let rect = canvas.getBoundingClientRect();
  let x = e.touches ? e.touches[0].clientX : e.clientX;
  let y = e.touches ? e.touches[0].clientY : e.clientY;
  return {x:Math.floor((x-rect.left)/SIZE), y:Math.floor((y-rect.top)/SIZE)};
}

// safe cell access
function getCell(x,y){ return grid[x] && grid[x][y]; }
function setCell(x,y,val){ if(grid[x] && y>=0 && y<H) grid[x][y]=val; }

function addSand(x,y){
  for(let dx=-2;dx<=2;dx++){
    for(let dy=-2;dy<=2;dy++){
      let nx=x+dx, ny=y+dy;
      if(nx>=0 && ny>=0 && nx<W && ny<H) setCell(nx,ny,"sand");
    }
  }
}

// pointer/mouse events
canvas.onpointerdown = e => {
  let p = pos(e);
  if(placingMachine){
    machines.push({type:placingMachine, x:p.x, y:p.y, mode:"blow", link:null, extended:false});
  } else drawing=true;
  addSand(p.x,p.y);
};
canvas.onpointerup = ()=>drawing=false;
canvas.onpointermove = e => { if(drawing) addSand(pos(e).x,pos(e).y); }

// UPDATE loop
function update(){
  // gravity
  for(let y=H-2; y>=0; y--){
    for(let x=0;x<W;x++){
      if(getCell(x,y) && !getCell(x,y+1)){
        setCell(x,y+1,getCell(x,y));
        setCell(x,y,null);
      }
    }
  }

  // machines
  machines.forEach(m=>{
    let powered = m.link && getCell(m.link.x,m.link.y)==="battery";

    // pipe
    if(m.type==="pipe" && powered){
      let dx=1;
      if(m.mode==="suck" && getCell(m.x+dx,m.y)){
        setCell(m.x,m.y,getCell(m.x+dx,m.y));
        setCell(m.x+dx,m.y,null);
      } else if(m.mode==="blow" && !getCell(m.x+dx,m.y) && getCell(m.x,m.y)){
        setCell(m.x+dx,m.y,getCell(m.x,m.y));
        setCell(m.x,m.y,null);
      }
    }

    // motor
    if(m.type==="motor" && powered){
      let dx=1;
      if(getCell(m.x-dx,m.y)){
        setCell(m.x,m.y,getCell(m.x-dx,m.y));
        setCell(m.x-dx,m.y,null);
      }
    }

    // piston
    if(m.type==="piston"){
      let dx=1;
      if(powered && !m.extended && !getCell(m.x+dx,m.y)){
        setCell(m.x+dx,m.y,"stone");
        m.extended=true;
      } else if(!powered && m.extended && getCell(m.x+dx,m.y)==="stone"){
        setCell(m.x+dx,m.y,null);
        m.extended=false;
      }
    }
  });

  // power spread
  for(let x=0;x<W;x++){
    for(let y=0;y<H;y++){
      power[x][y]*=0.9;
      if(getCell(x,y)==="battery") power[x][y]=1;
    }
  }
}

// DRAW loop
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let x=0;x<W;x++){
    for(let y=0;y<H;y++){
      if(getCell(x,y)){
        if(getCell(x,y)==="battery") ctx.fillStyle="yellow";
        else if(getCell(x,y)==="stone") ctx.fillStyle="gray";
        else ctx.fillStyle="#d9c27a";
        ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
      }
    }
  }

  machines.forEach(m=>{
    if(m.type==="pipe") ctx.fillStyle="purple";
    else if(m.type==="motor") ctx.fillStyle="blue";
    else if(m.type==="piston") ctx.fillStyle="red";
    ctx.fillRect(m.x*SIZE,m.y*SIZE,SIZE,SIZE);
  });
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();

</script>
</body>
</html>
