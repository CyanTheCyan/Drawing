<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Doodle Sandbox</title>
<style>
body { margin:0; background:white; overflow:hidden; font-family:sans-serif; }
canvas { display:block; touch-action:none; }
#ui { position:absolute; top:10px; left:10px; z-index:10; }
button { font-size:16px; margin:2px; }
</style>
</head>
<body>

<div id="ui">
  <button onclick="placingMachine='pipe'">Pipe</button>
  <button onclick="placingMachine='motor'">Motor</button>
  <button onclick="placingMachine='piston'">Piston</button>
  <button onclick="placingMachine=null">Draw Sand</button>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

const SIZE = 3;
let W,H;

let grid, power, machines;

function init(){
  W = Math.floor(canvas.width/SIZE);
  H = Math.floor(canvas.height/SIZE);
  grid = Array.from({length:W},()=>Array(H).fill(null));
  power = Array.from({length:W},()=>Array(H).fill(0));
  machines = [];
  
  // Add a battery in the middle
  grid[Math.floor(W/2)][Math.floor(H/2)] = "battery";
}
init();

let placingMachine=null;
let drawing=false;
let linking=null;

// GET POS
function pos(e){
 let r=canvas.getBoundingClientRect();
 let x=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
 let y=(e.touches?e.touches[0].clientY:e.clientY)-r.top;
 return {
  x:Math.floor(x/SIZE),
  y:Math.floor(y/SIZE)
 };
}

// CLICK
canvas.onpointerdown=(e)=>{
 let {x,y}=pos(e);

 if(placingMachine){
   machines.push({
     type:placingMachine,
     x,y,
     mode: Math.random()<0.5?"suck":"blow",
     link:null,
     dir: [1,0],
     extended:false
   });
   return;
 }

 drawing=true;
  addSand(x,y);
};

canvas.onpointerup=()=>drawing=false;

canvas.onpointermove=(e)=>{
 if(!drawing) return;
 let {x,y}=pos(e);
 addSand(x,y);
};

function addSand(x,y){
 for(let dx=-2;dx<=2;dx++){
  for(let dy=-2;dy<=2;dy++){
   let nx=x+dx, ny=y+dy;
   if(nx>=0&&ny>=0&&nx<W&&ny<H){
     grid[nx][ny]="sand";
   }
  }
 }
}

// UPDATE
function update(){
 for(let y=H-1;y>=0;y--){
  for(let x=0;x<W;x++){
    if(grid[x][y] && y+1<H && !grid[x][y+1]){
      grid[x][y+1]=grid[x][y];
      grid[x][y]=null;
    }
  }
 }

 machines.forEach(m=>{
   let powered=false;
   if(m.link){
     if(power[m.link.x]?.[m.link.y]>0.5) powered=true;
   }

   if(m.type==="pipe" && powered){
       let dx=1;
       if(m.mode==="suck" && grid[m.x+dx]?.[m.y]){
         grid[m.x][m.y]=grid[m.x+dx][m.y];
         grid[m.x+dx][m.y]=null;
       } else if(m.mode==="blow" && !grid[m.x+dx]?.[m.y] && grid[m.x][m.y]){
         grid[m.x+dx][m.y]=grid[m.x][m.y];
         grid[m.x][m.y]=null;
       }
   }

   if(m.type==="motor" && powered){
     let dx=1;
     if(grid[m.x-dx]?.[m.y]){
       grid[m.x][m.y]=grid[m.x-dx][m.y];
       grid[m.x-dx][m.y]=null;
     }
   }

   if(m.type==="piston"){
     if(powered && !m.extended){
       let dx=1;
       if(!grid[m.x+dx]?.[m.y]){
         grid[m.x+dx][m.y]="stone";
         m.extended=true;
       }
     } else if(!powered && m.extended){
       let dx=1;
       if(grid[m.x+dx]?.[m.y]==="stone") grid[m.x+dx][m.y]=null;
       m.extended=false;
     }
   }
 });

 for(let x=0;x<W;x++){
  for(let y=0;y<H;y++){
    power[x][y]*=0.9;
    if(grid[x][y]==="battery") power[x][y]=1;
  }
 }
}

// DRAW
function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 for(let x=0;x<W;x++){
  for(let y=0;y<H;y++){
    if(grid[x][y]){
      if(grid[x][y]==="battery") ctx.fillStyle="yellow";
      else if(grid[x][y]==="stone") ctx.fillStyle="gray";
      else ctx.fillStyle="#d9c27a";
      ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
    }
  }
 }

 machines.forEach(m=>{
   if(m.type==="pipe") ctx.fillStyle="purple";
   if(m.type==="motor") ctx.fillStyle="blue";
   if(m.type==="piston") ctx.fillStyle="red";
   ctx.fillRect(m.x*SIZE,m.y*SIZE,SIZE,SIZE);
 });
}

// LOOP
function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>

</body>
</html>
