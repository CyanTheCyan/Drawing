<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Machine Sandbox</title>
<style>
body { margin:0; background:white; overflow:hidden; font-family:sans-serif; }
canvas { display:block; touch-action:none; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

const SIZE = 3;
let W,H;

let grid, power, machines;

function init(){
  W = Math.floor(canvas.width/SIZE);
  H = Math.floor(canvas.height/SIZE);
  grid = Array.from({length:W},()=>Array(H).fill(null));
  power = Array.from({length:W},()=>Array(H).fill(0));
  machines = [];
}
init();

let mat="sand";
let placingMachine=null;
let drawing=false;
let linking=null;

// MATERIAL SELECT
document.addEventListener("keydown",e=>{
 if(e.key==="p") placingMachine="pipe";
 if(e.key==="m") placingMachine="motor";
 if(e.key==="o") placingMachine="piston";
});

// GET POS
function pos(e){
 let r=canvas.getBoundingClientRect();
 let x=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
 let y=(e.touches?e.touches[0].clientY:e.clientY)-r.top;
 return {
  x:Math.floor(x/SIZE),
  y:Math.floor(y/SIZE)
 };
}

// CLICK
canvas.onmousedown=(e)=>{
 let {x,y}=pos(e);

 if(e.shiftKey){
   // LINK SYSTEM
   if(!linking){
     linking={x,y};
   } else {
     machines.forEach(m=>{
       if(m.x===linking.x && m.y===linking.y){
         m.link={x,y};
       }
     });
     linking=null;
   }
   return;
 }

 if(placingMachine){
   machines.push({
     type:placingMachine,
     x,y,
     mode: Math.random()<0.5?"suck":"blow",
     link:null,
     dir: [1,0],
     extended:false
   });
   placingMachine=null;
   return;
 }

 drawing=true;
};

canvas.onmouseup=()=>drawing=false;

canvas.onmousemove=(e)=>{
 if(!drawing) return;
 let {x,y}=pos(e);

 for(let dx=-2;dx<=2;dx++){
  for(let dy=-2;dy<=2;dy++){
   let nx=x+dx, ny=y+dy;
   if(nx>=0&&ny>=0&&nx<W&&ny<H){
     grid[nx][ny]="sand";
   }
  }
 }
};

// UPDATE
function update(){

 // gravity
 for(let y=H-1;y>=0;y--){
  for(let x=0;x<W;x++){
    if(grid[x][y] && y+1<H && !grid[x][y+1]){
      grid[x][y+1]=grid[x][y];
      grid[x][y]=null;
    }
  }
 }

 // machines
 machines.forEach(m=>{
   let powered=false;

   if(m.link){
     if(power[m.link.x]?.[m.link.y]>0.5) powered=true;
   }

   if(m.type==="pipe"){
     if(powered){
       let dx=1, dy=0;

       if(m.mode==="suck"){
         if(grid[m.x+dx]?.[m.y]){
           grid[m.x][m.y]=grid[m.x+dx][m.y];
           grid[m.x+dx][m.y]=null;
         }
       } else {
         if(!grid[m.x+dx]?.[m.y] && grid[m.x][m.y]){
           grid[m.x+dx][m.y]=grid[m.x][m.y];
           grid[m.x][m.y]=null;
         }
       }
     }
   }

   if(m.type==="motor"){
     if(powered){
       let dx=1,dy=0;
       if(grid[m.x-dx]?.[m.y]){
         grid[m.x][m.y]=grid[m.x-dx][m.y];
         grid[m.x-dx][m.y]=null;
       }
     }
   }

   if(m.type==="piston"){
     if(powered && !m.extended){
       let dx=1;
       if(!grid[m.x+dx]?.[m.y]){
         grid[m.x+dx][m.y]="stone";
         m.extended=true;
       }
     } else if(!powered && m.extended){
       let dx=1;
       if(grid[m.x+dx]?.[m.y]==="stone"){
         grid[m.x+dx][m.y]=null;
       }
       m.extended=false;
     }
   }
 });

 // simple power spread
 for(let x=0;x<W;x++){
  for(let y=0;y<H;y++){
    power[x][y]*=0.9;
    if(grid[x][y]==="battery") power[x][y]=1;
  }
 }
}

// DRAW
function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 for(let x=0;x<W;x++){
  for(let y=0;y<H;y++){
    if(grid[x][y]){
      ctx.fillStyle="#d9c27a";
      ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
    }
  }
 }

 machines.forEach(m=>{
   if(m.type==="pipe") ctx.fillStyle="purple";
   if(m.type==="motor") ctx.fillStyle="blue";
   if(m.type==="piston") ctx.fillStyle="red";

   ctx.fillRect(m.x*SIZE,m.y*SIZE,SIZE,SIZE);
 });
}

// LOOP
function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
