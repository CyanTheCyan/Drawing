<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smooth Sandbox</title>
<style>
body {
  margin: 0;
  background: white;
  text-align: center;
  font-family: sans-serif;
}
canvas {
  border: 1px solid #ccc;
  cursor: crosshair;
}
button {
  margin: 4px;
  padding: 8px;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>
<body>

<h3>Smooth Sandbox</h3>

<div>
<button onclick="setMat('sand')">Sand</button>
<button onclick="setMat('water')">Water</button>
<button onclick="setMat('stone')">Stone</button>
<button onclick="setMat('wire')">Wire</button>
<button onclick="setMat('battery')">Battery</button>
<button onclick="setMat('uranium')">Uranium</button>
<button onclick="setMat('slime')">Slime</button>
<button onclick="setMat('eraser')">Eraser</button>
</div>

<canvas id="c" width="700" height="450"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const SIZE = 2; // smaller = smoother look
const W = canvas.width / SIZE;
const H = canvas.height / SIZE;

let grid = Array.from({length:W},()=>Array(H).fill(null));
let power = Array.from({length:W},()=>Array(H).fill(0));

let mat = "sand";
let drawing = false;

function setMat(m){ mat = m; }

canvas.onmousedown = ()=>drawing=true;
canvas.onmouseup = ()=>drawing=false;
canvas.onmousemove = (e)=>{
 if(!drawing) return;

 const r = canvas.getBoundingClientRect();
 const x = Math.floor((e.clientX-r.left)/SIZE);
 const y = Math.floor((e.clientY-r.top)/SIZE);

 // circular brush (less blocky)
 for(let dx=-3;dx<=3;dx++){
  for(let dy=-3;dy<=3;dy++){
    if(dx*dx+dy*dy > 9) continue;

    let nx=x+dx, ny=y+dy;
    if(nx>=0&&ny>=0&&nx<W&&ny<H){
      if(mat==="eraser"){
        grid[nx][ny]=null;
        power[nx][ny]=0;
      } else {
        grid[nx][ny]=mat;
      }
    }
  }
 }
};

function update(){
 for(let x=0;x<W;x++){
  for(let y=0;y<H;y++){
    power[x][y]*=0.92;
  }
 }

 for(let y=H-1;y>=0;y--){
  for(let x=0;x<W;x++){
    let m = grid[x][y];
    if(!m) continue;

    if(m==="sand"){
      if(y+1<H && !grid[x][y+1]){
        grid[x][y+1]=m; grid[x][y]=null;
      } else {
        let dir = Math.random()<0.5?-1:1;
        if(x+dir>=0 && x+dir<W && y+1<H && !grid[x+dir][y+1]){
          grid[x+dir][y+1]=m; grid[x][y]=null;
        }
      }
    }

    if(m==="water"){
      let dir = Math.random()<0.5?-1:1;
      if(y+1<H && !grid[x][y+1]){
        grid[x][y+1]=m; grid[x][y]=null;
      } else if(x+dir>=0 && x+dir<W && !grid[x+dir][y]){
        grid[x+dir][y]=m; grid[x][y]=null;
      }
    }

    if(m==="slime"){
      if(Math.random()<0.25){
        if(y+1<H && !grid[x][y+1]){
          grid[x][y+1]=m; grid[x][y]=null;
        }
      }
    }

    if(m==="uranium"){
      if(Math.random()<0.005){
        let nx=x+(Math.random()*3|0)-1;
        let ny=y+(Math.random()*3|0)-1;
        if(nx>=0&&ny>=0&&nx<W&&ny<H && !grid[nx][ny]){
          grid[nx][ny]="uranium";
        }
      }
    }

    if(m==="battery"){
      power[x][y]=1;
    }

    if(m==="wire"){
      let dirs=[[1,0],[-1,0],[0,1],[0,-1]];
      for(let d of dirs){
        let nx=x+d[0], ny=y+d[1];
        if(nx>=0&&ny>=0&&nx<W&&ny<H){
          if(power[nx][ny]>0.4){
            power[x][y]=1;
          }
        }
      }
    }
  }
 }
}

function render(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 for(let x=0;x<W;x++){
  for(let y=0;y<H;y++){
    let m=grid[x][y];
    if(!m) continue;

    let color="#000";

    if(m==="sand") color="#e6d28f";
    if(m==="water") color="#4aa3ff";
    if(m==="stone") color="#999";
    if(m==="slime") color="#66ffbb";
    if(m==="uranium") color="#66ff66";
    if(m==="battery") color="#ff5555";

    if(m==="wire"){
      color = power[x][y]>0.5 ? "#ffd84d" : "#bbb";
    }

    // soft rendering
    ctx.globalAlpha = 0.9;
    ctx.fillStyle=color;
    ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
  }
 }

 ctx.globalAlpha = 1;
}

function loop(){
 update();
 render();
 requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
