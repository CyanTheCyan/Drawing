<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Sandbox</title>
<style>
body { margin:0; background:#111; color:white; text-align:center; font-family:sans-serif;}
canvas { border:2px solid white; cursor:crosshair; }
button { margin:4px; padding:8px; font-weight:bold; cursor:pointer;}
</style>
</head>
<body>

<h2>⚡ Advanced Sandbox</h2>

<div>
<button onclick="setMat('sand')">Sand</button>
<button onclick="setMat('water')">Water</button>
<button onclick="setMat('stone')">Stone</button>
<button onclick="setMat('wire')">Wire</button>
<button onclick="setMat('battery')">Battery</button>
<button onclick="setMat('uranium')">Uranium</button>
<button onclick="setMat('slime')">Slime</button>
<button onclick="setMat('eraser')">Eraser</button>
</div>

<canvas id="c" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const SIZE = 4;
const W = canvas.width / SIZE;
const H = canvas.height / SIZE;

let grid = Array.from({length:W},()=>Array(H).fill(null));
let power = Array.from({length:W},()=>Array(H).fill(0));

let mat = "sand";
let drawing = false;

function setMat(m){ mat = m; }

canvas.onmousedown = ()=>drawing=true;
canvas.onmouseup = ()=>drawing=false;
canvas.onmousemove = (e)=>{
 if(!drawing) return;
 const r = canvas.getBoundingClientRect();
 const x = Math.floor((e.clientX-r.left)/SIZE);
 const y = Math.floor((e.clientY-r.top)/SIZE);

 for(let dx=-2;dx<=2;dx++){
  for(let dy=-2;dy<=2;dy++){
    let nx=x+dx, ny=y+dy;
    if(nx>=0&&ny>=0&&nx<W&&ny<H){
      if(mat==="eraser"){
        grid[nx][ny]=null;
        power[nx][ny]=0;
      } else {
        grid[nx][ny]=mat;
      }
    }
  }
 }
};

function update(){
 // reset power decay
 for(let x=0;x<W;x++){
  for(let y=0;y<H;y++){
    power[x][y]*=0.9;
  }
 }

 for(let y=H-1;y>=0;y--){
  for(let x=0;x<W;x++){
    let m = grid[x][y];
    if(!m) continue;

    // SAND
    if(m==="sand"){
      if(y+1<H && !grid[x][y+1]){
        grid[x][y+1]=m; grid[x][y]=null;
      }
    }

    // WATER
    if(m==="water"){
      let dir = Math.random()<0.5?-1:1;
      if(y+1<H && !grid[x][y+1]){
        grid[x][y+1]=m; grid[x][y]=null;
      } else if(x+dir>=0 && x+dir<W && !grid[x+dir][y]){
        grid[x+dir][y]=m; grid[x][y]=null;
      }
    }

    // SLIME (slow + sticky)
    if(m==="slime"){
      if(Math.random()<0.3){
        if(y+1<H && !grid[x][y+1]){
          grid[x][y+1]=m; grid[x][y]=null;
        }
      }
    }

    // URANIUM (spreads)
    if(m==="uranium"){
      if(Math.random()<0.01){
        let dx = Math.floor(Math.random()*3)-1;
        let dy = Math.floor(Math.random()*3)-1;
        let nx=x+dx, ny=y+dy;
        if(nx>=0&&ny>=0&&nx<W&&ny<H && !grid[nx][ny]){
          grid[nx][ny]="uranium";
        }
      }
    }

    // BATTERY (source)
    if(m==="battery"){
      power[x][y]=1;
    }

    // WIRE conducts
    if(m==="wire"){
      let dirs=[[1,0],[-1,0],[0,1],[0,-1]];
      for(let d of dirs){
        let nx=x+d[0], ny=y+d[1];
        if(nx>=0&&ny>=0&&nx<W&&ny<H){
          if(power[nx][ny]>0.5){
            power[x][y]=1;
          }
        }
      }
    }

  }
 }
}

function render(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 for(let x=0;x<W;x++){
  for(let y=0;y<H;y++){
    let m=grid[x][y];
    if(!m) continue;

    let color="#fff";

    if(m==="sand") color="#d9c27a";
    if(m==="water") color="#3399ff";
    if(m==="stone") color="#777";
    if(m==="slime") color="#00ff88";
    if(m==="uranium") color="#55ff55";
    if(m==="battery") color="#ff3333";

    if(m==="wire"){
      color = power[x][y]>0.5 ? "#ffff00" : "#555";
    }

    ctx.fillStyle=color;
    ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
  }
 }
}

function loop(){
 update();
 render();
 requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
